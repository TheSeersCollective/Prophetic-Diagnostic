<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>The Seers Collective</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0F1729; --black-light: #141E35; --black-card: #1A2340;
  --black-elevated: #202C4A; --black-border: #2A3758;
  --sidebar-bg: #070D1C;
  --gold: #E8C15C; --gold-bright: #F2D079; --gold-dim: #B8923D;
  --gold-glow: rgba(232,193,92,0.15); --gold-soft: rgba(232,193,92,0.08);
  --white: #F5F2EC; --white-mid: rgba(245,242,236,0.78);
  --white-dim: rgba(245,242,236,0.45); --white-faint: rgba(245,242,236,0.10);
  --white-ghost: rgba(245,242,236,0.05);
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#0F1729;-webkit-text-size-adjust:100%;}
body{font-family:var(--sans);background:var(--black);color:var(--white);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5;}

/* ── NOISE OVERLAY ── */
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes dxSlideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}

/* ══ ONBOARDING ══════════════════════════════════════════════ */
.onboarding{min-height:100vh;background:var(--black);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.onboarding::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:80vw;height:60vh;background:radial-gradient(ellipse at center,var(--gold-glow) 0%,transparent 60%);pointer-events:none;z-index:0;}
.onb-card{position:relative;z-index:1;text-align:center;padding:0 24px;max-width:480px;animation:fadeUp 0.8s ease-out;}
.onb-mark{font-family:var(--serif);font-size:3rem;color:var(--gold);letter-spacing:-0.02em;margin-bottom:6px;line-height:1;}
.onb-title{font-family:var(--serif);font-size:1.5rem;font-weight:400;margin-bottom:10px;color:var(--white);}
.onb-sub{font-size:0.82rem;color:var(--white-dim);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:48px;}
.onb-divider{width:40px;height:1px;background:var(--gold);opacity:0.4;margin:0 auto 48px;}
.onb-label{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:block;}
.onb-input{width:100%;background:var(--black-card);border:1px solid var(--black-border);padding:16px 20px;font-family:var(--sans);font-size:1rem;color:var(--white);outline:none;text-align:center;transition:border-color 0.2s;margin-bottom:20px;letter-spacing:0.02em;}
.onb-input:focus{border-color:var(--gold);}
.onb-input::placeholder{color:var(--white-dim);}
.onb-btn{width:100%;font-family:var(--sans);font-size:0.78rem;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;padding:18px;background:var(--gold);color:var(--black);border:none;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);}
.onb-btn:hover{background:var(--gold-bright);transform:translateY(-2px);}
.onb-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
.onb-note{font-size:0.68rem;color:var(--white-dim);margin-top:18px;letter-spacing:0.08em;line-height:1.6;}
.onb-logo-wrap{margin-bottom:28px;display:flex;justify-content:center;}
.onb-logo{width:200px;height:auto;display:block;}
.onb-ambient{position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:70vw;height:50vh;background:radial-gradient(ellipse at center,rgba(232,193,92,0.12) 0%,transparent 65%);pointer-events:none;z-index:0;}
.onb-rule{width:50px;height:1px;background:var(--gold);opacity:0.35;margin:0 auto 22px;}
.onb-subtitle{font-family:var(--sans);font-size:0.72rem;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;color:var(--white-dim);margin-bottom:22px;}
.onb-verse{font-family:var(--serif);font-style:italic;font-size:0.78rem;color:var(--white-dim);margin-top:28px;line-height:1.7;opacity:0.7;max-width:360px;margin-left:auto;margin-right:auto;}

/* ══ APP SHELL ═══════════════════════════════════════════════ */
.app-wrap{display:flex;min-height:100vh;}

/* ── Sidebar ── */
.sidebar{width:252px;background:var(--sidebar-bg);position:fixed;left:0;top:0;bottom:0;z-index:100;display:flex;flex-direction:column;border-right:1px solid rgba(42,55,88,0.7);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);}
.sidebar-logo{padding:26px 24px 22px;border-bottom:1px solid var(--white-faint);}
.logo-mark{font-family:var(--serif);font-size:1.1rem;color:var(--gold);letter-spacing:0.06em;margin-bottom:2px;}
.logo-name{font-family:var(--sans);font-size:0.62rem;font-weight:600;letter-spacing:0.32em;text-transform:uppercase;color:var(--white-dim);}
.sidebar-nav{flex:1;overflow-y:auto;padding:18px 0;scrollbar-width:none;}
.sidebar-nav::-webkit-scrollbar{display:none;}
.nav-section-label{font-size:0.58rem;font-weight:600;letter-spacing:0.32em;text-transform:uppercase;color:var(--white-dim);padding:14px 24px 6px;opacity:0.45;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 24px;cursor:pointer;transition:all 0.18s;color:var(--white-dim);font-family:var(--sans);font-size:0.83rem;font-weight:400;border-left:2px solid transparent;position:relative;user-select:none;}
.nav-item:hover{color:var(--white);background:rgba(245,242,236,0.04);}
.nav-item.nav-active{color:var(--gold);border-left-color:var(--gold);background:var(--gold-soft);}
.nav-item.nav-locked{opacity:0.38;cursor:not-allowed;}
.nav-item.nav-locked:hover{color:var(--white-dim);background:transparent;}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.8;}
.nav-item.nav-active .nav-icon{opacity:1;}
.nav-soon-dot{width:5px;height:5px;border-radius:50%;background:var(--white-faint);border:1px solid var(--black-border);margin-left:auto;flex-shrink:0;}
.sidebar-footer{padding:18px 24px;border-top:1px solid var(--white-faint);}
.sidebar-user{display:flex;align-items:center;gap:11px;cursor:pointer;padding:8px 10px;transition:background 0.2s;border-radius:0;}
.sidebar-user:hover{background:var(--white-ghost);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-soft);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:0.9rem;color:var(--gold);flex-shrink:0;text-transform:uppercase;}
.user-name{font-size:0.83rem;color:var(--white);font-weight:500;line-height:1.2;}
.user-sub{font-size:0.65rem;color:var(--white-dim);line-height:1.2;}

/* ── Main Content ── */
.main-content{margin-left:252px;flex:1;min-height:100vh;}
.page-pad{padding:44px 52px;max-width:1080px;}
.view-enter{animation:fadeIn 0.35s ease-out;}

/* ── Hamburger ── */
.hamburger{display:none;align-items:center;justify-content:center;width:42px;height:42px;background:var(--black-card);border:1px solid var(--black-border);cursor:pointer;position:fixed;top:16px;left:16px;z-index:200;flex-direction:column;gap:5px;}
.ham-line{width:20px;height:1.5px;background:var(--white);transition:all 0.2s;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(7,13,28,0.7);z-index:99;}

/* ══ DASHBOARD ═══════════════════════════════════════════════ */
.dash-header{margin-bottom:36px;}
.dash-greeting{font-family:var(--serif);font-size:1.9rem;font-weight:400;line-height:1.2;margin-bottom:5px;}
.dash-greeting em{font-style:normal;color:var(--gold);}
.dash-date{font-size:0.72rem;color:var(--white-dim);letter-spacing:0.16em;text-transform:uppercase;}

/* Hero */
.hero-card{background:var(--black-card);border:1px solid var(--black-border);padding:36px 44px;margin-bottom:44px;position:relative;overflow:hidden;transition:border-color 0.25s;}
.hero-card::after{content:'';position:absolute;top:0;right:0;bottom:0;width:45%;background:radial-gradient(ellipse at right center,rgba(232,193,92,0.09) 0%,transparent 70%);pointer-events:none;}
.hero-tag{font-size:0.62rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.hero-tag::before{content:'';width:14px;height:1px;background:var(--gold);opacity:0.6;}
.hero-hebrew{font-family:var(--serif);font-size:3.4rem;color:var(--gold);line-height:1;margin-bottom:6px;}
.hero-translit{font-family:var(--serif);font-style:italic;font-size:1.35rem;color:var(--white-mid);margin-bottom:10px;}
.hero-role{font-size:0.75rem;font-weight:500;letter-spacing:0.26em;text-transform:uppercase;color:var(--white);margin-bottom:26px;}
.hero-completed{font-size:0.68rem;color:var(--white-dim);letter-spacing:0.1em;margin-bottom:22px;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
/* No result hero */
.hero-cta-eyebrow{font-size:0.62rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.hero-cta-eyebrow::before{content:'';width:14px;height:1px;background:var(--gold);opacity:0.6;}
.hero-cta-title{font-family:var(--serif);font-size:1.75rem;font-weight:400;line-height:1.25;margin-bottom:12px;max-width:500px;}
.hero-cta-desc{font-size:0.92rem;color:var(--white-mid);line-height:1.7;max-width:560px;margin-bottom:28px;}

/* Tools grid */
.sec-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.sec-label{font-size:0.65rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--white-dim);white-space:nowrap;}
.sec-rule{flex:1;height:1px;background:var(--white-faint);}
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:52px;}
.tool-card{background:var(--black-card);border:1px solid var(--black-border);padding:24px 22px;transition:all 0.22s ease;cursor:pointer;position:relative;overflow:hidden;}
.tool-card.tc-active:hover{border-color:rgba(232,193,92,0.4);transform:translateY(-3px);box-shadow:0 16px 40px -10px rgba(0,0,0,0.6),0 0 0 1px rgba(232,193,92,0.12);}
.tool-card.tc-soon{opacity:0.48;cursor:default;}
.tool-card.tc-soon:hover{transform:none;}
.tc-badge{display:inline-flex;font-size:0.58rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:3px 9px;margin-bottom:18px;}
.badge-live{background:rgba(232,193,92,0.1);color:var(--gold);border:1px solid rgba(232,193,92,0.22);}
.badge-coming{background:var(--white-ghost);color:var(--white-dim);border:1px solid var(--white-faint);}
.tc-icon{margin-bottom:16px;color:var(--gold);}
.tc-name{font-family:var(--serif);font-size:1.1rem;font-weight:400;margin-bottom:7px;color:var(--white);}
.tc-desc{font-size:0.82rem;color:var(--white-dim);line-height:1.6;}
.tc-arrow{position:absolute;bottom:18px;right:18px;color:var(--gold);opacity:0;transition:opacity 0.2s,transform 0.2s;}
.tool-card.tc-active:hover .tc-arrow{opacity:1;transform:translateX(3px);}

/* ══ SHARED BUTTONS ══════════════════════════════════════════ */
.btn{font-family:var(--sans);font-size:0.75rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;padding:14px 32px;background:var(--gold);color:var(--black);border:none;cursor:pointer;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);}
.btn:hover{background:var(--gold-bright);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:var(--white);border:1px solid var(--white-faint);}
.btn-ghost:hover{background:var(--white-ghost);border-color:rgba(232,193,92,0.4);color:var(--gold);transform:none;}
.btn-sm{padding:10px 22px;font-size:0.7rem;}

/* ══ PROFILE VIEW ════════════════════════════════════════════ */
.prof-header{margin-bottom:36px;display:flex;align-items:flex-end;gap:20px;justify-content:space-between;flex-wrap:wrap;}
.prof-title{font-family:var(--serif);font-size:1.75rem;font-weight:400;}
.prof-sub{font-size:0.8rem;color:var(--white-dim);margin-top:6px;}
.no-result-wrap{padding:80px 0;text-align:center;}
.no-result-wrap h2{font-family:var(--serif);font-size:1.5rem;font-weight:400;margin-bottom:14px;}
.no-result-wrap p{color:var(--white-mid);font-size:0.92rem;margin-bottom:28px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.7;}

/* ══ COMING SOON TOOL PAGE ════════════════════════════════════ */
.cs-back{font-family:var(--sans);font-size:0.7rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--white-dim);background:none;border:none;cursor:pointer;padding:0;margin-bottom:36px;display:flex;align-items:center;gap:8px;transition:color 0.2s;}
.cs-back:hover{color:var(--gold);}
.cs-wrap{max-width:620px;}
.cs-pill{display:inline-flex;align-items:center;gap:6px;font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--white-dim);background:var(--white-ghost);border:1px solid var(--white-faint);padding:5px 12px;margin-bottom:20px;}
.cs-title{font-family:var(--serif);font-size:2.1rem;font-weight:400;margin-bottom:14px;line-height:1.2;}
.cs-desc{font-size:0.97rem;color:var(--white-mid);line-height:1.75;margin-bottom:36px;}
.cs-features{background:var(--black-card);border:1px solid var(--black-border);padding:26px 28px;margin-bottom:36px;}
.cs-feat-label{font-size:0.62rem;font-weight:600;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.cs-feat{display:flex;align-items:flex-start;gap:12px;font-size:0.9rem;color:var(--white-mid);line-height:1.55;margin-bottom:10px;}
.cs-feat::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0;}
.cs-notify{display:flex;gap:10px;margin-top:8px;}
.cs-notify-input{flex:1;background:var(--black-elevated);border:1px solid var(--black-border);padding:13px 16px;font-family:var(--sans);font-size:0.88rem;color:var(--white);outline:none;transition:border-color 0.2s;}
.cs-notify-input:focus{border-color:var(--gold);}
.cs-notify-input::placeholder{color:var(--white-dim);}
.cs-notify-btn{font-family:var(--sans);font-size:0.7rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:13px 22px;background:var(--gold);color:var(--black);border:none;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
.cs-notify-btn:hover{background:var(--gold-bright);}
.cs-notified{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--gold);padding:14px 0;letter-spacing:0.06em;}

/* ══ DIAGNOSTIC STYLES (dx-*) ════════════════════════════════ */
.dx-wrap{max-width:760px;margin:0 auto;padding:8px 0 80px;}
.dx-intro{text-align:center;padding:20px 0;}
.dx-eyebrow{font-family:var(--sans);font-size:0.7rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:inline-flex;align-items:center;gap:12px;}
.dx-eyebrow::before,.dx-eyebrow::after{content:'';width:28px;height:1px;background:var(--gold);opacity:0.5;}
.dx-h1{font-family:var(--serif);font-size:clamp(1.9rem,3.5vw,3rem);font-weight:400;line-height:1.1;margin-bottom:22px;}
.dx-h1 em{font-style:italic;color:var(--gold);}
.dx-lead{font-size:0.97rem;color:var(--white-mid);max-width:560px;margin:0 auto 14px;line-height:1.7;}
.dx-quote{font-family:var(--serif);font-style:italic;font-size:0.97rem;color:var(--white-dim);margin:36px auto 40px;max-width:480px;line-height:1.6;padding:16px 28px;border-left:1px solid var(--gold);border-right:1px solid var(--gold);}
.dx-quote span{display:block;font-family:var(--sans);font-style:normal;font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-top:10px;}
.dx-meta{font-size:0.68rem;color:var(--white-dim);margin-top:18px;letter-spacing:0.18em;text-transform:uppercase;}
.dx-btn{font-family:var(--sans);font-size:0.75rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;padding:15px 38px;background:var(--gold);color:var(--black);border:none;cursor:pointer;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);}
.dx-btn:hover{background:var(--gold-bright);transform:translateY(-2px);}
.dx-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
.dx-btn-ghost{background:transparent;color:var(--white);border:1px solid var(--white-faint);}
.dx-btn-ghost:hover{background:var(--white-ghost);border-color:rgba(232,193,92,0.4);color:var(--gold);transform:none;}
.dx-progress-wrap{margin-bottom:44px;}
.dx-progress-meta{display:flex;justify-content:space-between;margin-bottom:12px;font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--white-dim);}
.dx-gold{color:var(--gold);font-weight:600;}
.dx-progress-bar{height:2px;background:var(--white-faint);position:relative;overflow:hidden;}
.dx-progress-fill{position:absolute;inset:0;right:auto;background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-bright));transition:width 0.5s cubic-bezier(0.16,1,0.3,1);}
.dx-card{animation:dxSlideIn 0.4s cubic-bezier(0.16,1,0.3,1);}
.dx-ref{font-size:0.68rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.dx-question{font-family:var(--serif);font-size:clamp(1.25rem,2.2vw,1.7rem);font-weight:400;line-height:1.3;margin-bottom:30px;}
.dx-calib-sub{font-size:0.88rem;color:var(--white-dim);margin-top:-18px;margin-bottom:22px;font-style:italic;line-height:1.6;}
.dx-options{display:flex;flex-direction:column;gap:11px;}
.dx-option{background:var(--black-card);border:1px solid var(--black-border);padding:19px 22px;cursor:pointer;transition:all 0.2s ease;text-align:left;font-family:var(--sans);font-size:0.95rem;color:var(--white);line-height:1.55;display:flex;align-items:flex-start;gap:15px;width:100%;}
.dx-option::before{content:'';width:13px;height:13px;border:1px solid var(--white-faint);border-radius:50%;flex-shrink:0;margin-top:4px;transition:all 0.2s;}
.dx-option:hover{border-color:var(--gold);background:var(--black-elevated);transform:translateX(4px);}
.dx-option:hover::before{border-color:var(--gold);}
.dx-option.dx-selected{border-color:var(--gold);background:var(--black-elevated);}
.dx-option.dx-selected::before{background:var(--gold);border-color:var(--gold);box-shadow:inset 0 0 0 3px var(--black-elevated);}
.dx-option-check::before{border-radius:3px;width:14px;height:14px;}
.dx-option-check.dx-selected::before{background:var(--gold);border-color:var(--gold);box-shadow:none;}
.dx-nav{display:flex;justify-content:space-between;align-items:center;margin-top:36px;}
.dx-btn-back{font-family:var(--sans);font-size:0.7rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--white-dim);background:transparent;border:none;cursor:pointer;padding:10px 0;transition:color 0.2s;}
.dx-btn-back:hover{color:var(--gold);}
.dx-btn-back:disabled{opacity:0.3;cursor:not-allowed;}
.dx-result{}
.dx-result-header{text-align:center;margin-bottom:48px;padding-top:8px;}
.dx-result-label{font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:inline-flex;align-items:center;gap:10px;}
.dx-result-label::before,.dx-result-label::after{content:'';width:18px;height:1px;background:var(--gold);opacity:0.5;}
.dx-result-hebrew{font-family:var(--serif);font-size:clamp(2.6rem,6vw,4.2rem);line-height:1;margin-bottom:10px;color:var(--gold);}
.dx-result-translit{font-family:var(--serif);font-style:italic;font-size:clamp(1.2rem,2.2vw,1.55rem);color:var(--white-mid);margin-bottom:14px;}
.dx-result-role{font-size:0.75rem;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:var(--white);}
.dx-section{margin-bottom:36px;padding:24px 0;border-top:1px solid var(--white-faint);}

      biblical: 'Moses and Aaron model this pattern — Moses the sent prophet and Aaron the one who perceives and speaks on his behalf. Samuel functioned in both streams, but at its core the Nabi-Roeh dynamic is what created the prophetic schools: a declaring stream and a perceiving stream in the same community.',

      ref: '1 Sam 9:19; 2 Sam 12:1-14; 1 Chr 29:29',
      watch: 'You may over-qualify what you see, holding back revelation that needs to be released. Trust the Nabi with what you have perceived — they can carry the weight of delivery that you were not built for.'

    secondary: {

      biblical: 'Gad was called both Roeh and Chozeh. Samuel and Iddo both held perception across both realms. This pairing is where the deepest prophetic counsel comes from.',

      biblical: 'Ezekiel was a Chozeh who also declared with nataph-quality speech. Isaiah combined Chozeh vision with Nabi declaration across his book. The pattern throughout the writing prophets is vision received privately and declared publicly.',

      biblical: 'Ezekiel at the river Chebar (Chozeh) and on the watchman\'s wall (Tsaphah). Habakkuk on his watchtower, seeing chazon-visions.',

      biblical: 'Zechariah combined Chozeh night visions with Nataph prophetic speech. Ezekiel\'s sign-acts and spontaneous utterances (Ez 20:46 uses nataph) arose from his elaborate visions. Much of the Psalms reflects this pairing — David the seer and singer whose words dropped from what he had seen.',
      ref: 'Zech 1:7-8; Ez 20:46; Ps 45:1',
      watch: 'Your flow can move faster than the Chozeh has processed. Wait for the vision to be ready. Equally, you help the Chozeh not get stuck in interpretation — your spontaneous release can unlock what they have been sitting on too long.'

      biblical: 'Samuel was called both man of God (Ish HaElohim) and Roeh in the same passage (1 Sam 9:6-10). His home at Ramah became a place of pilgrimage — people came to him. This is the Sought Father pattern at its fullest. Elisha similarly.',
      ref: '1 Sam 9:6-10; 2 Kgs 4:8-9; Luke 2:36-38',

      ref: 'Deut 33:1; 1 Kgs 17:1; 17:24'
    }
  }
